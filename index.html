<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trustway Logistics</title>

<style>
body {font-family: Arial; margin: 0; background: #f4f6f9;}

header {background: #2b5dab; color: white; padding: 15px; text-align: center;}

nav {background: #1f4a8a; padding: 10px; text-align: center;}
nav a {color: white; margin: 0 10px; text-decoration: none; font-weight: bold;}

.container {
    max-width: 700px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input {width: 100%; padding: 10px; margin-bottom: 10px;}

button {
    width: 100%;
    padding: 10px;
    background: #2b5dab;
    color: white;
    border: none;
}

.status {
    background: #c8e6c9;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

.hidden {display: none;}

img {width: 100%; margin-top: 15px;}
</style>
</head>

<body>

<header>
<h2>Global Shipment Tracking</h2>
<p>Trustway Logistics</p>
</header>

<nav>
<a href="#" onclick="showPage('home')">Home</a>
<a href="#" onclick="showPage('about')">About</a>
<a href="#" onclick="showPage('contact')">Contact</a>
</nav>

<div class="container" id="home">

<h3>Track Your Shipment</h3>

<input id="trackingInput" placeholder="Enter Tracking Number">
<button onclick="track()">Track Shipment</button>

<div id="result" class="hidden"></div>

</div>

<div class="container hidden" id="about">
<h2>About Us</h2>
<p>Trustway Logistics is a global shipping company providing reliable cargo services.</p>
</div>

<div class="container hidden" id="contact">
<h2>Contact</h2>
<p>Email: support@trustwayship.com</p>
<p>Phone: +86 755 1234 5678</p>
</div>

<script>

// ✅ بيانات ثابتة 100%
const shipments = {
    "HC1001": {
        status: "In Transit",
        customer: "Mustafa fathelrhman",
        shipment: "Solar powered ev charging devices",
        origin: "Shenzhen Port, China",
        destination: "Umm Qasr Port, Iraq",
        price: 2900,
        arrival: "7 May 2026",
        image: "bill.png"
    },
    "HC1001-A9B7C3D5": {
        status: "In Transit",
        customer: "Mustafa fathelrhman",
        shipment: "Solar powered ev charging devices",
        origin: "Shenzhen Port, China",
        destination: "Umm Qasr Port, Iraq",
        price: 2900,
        arrival: "7 May 2026",
        image: "bill.png"
    }
};

function track() {
    let code = document.getElementById("trackingInput").value.trim();
    let result = document.getElementById("result");

    if(shipments[code]) {
        let d = shipments[code];

        result.innerHTML = `
            <div class="status">${d.status}</div>

            <p><b>Tracking:</b> ${code}</p>
            <p><b>Customer:</b> ${d.customer}</p>
            <p><b>Shipment:</b> ${d.shipment}</p>
            <p><b>From:</b> ${d.origin}</p>
            <p><b>To:</b> ${d.destination}</p>
            <p><b>Price:</b> $${d.price}</p>
            <p><b>Arrival:</b> ${d.arrival}</p>

            <img src="${d.image}">
        `;

        result.classList.remove("hidden");
    } else {
        alert("Tracking number not found");
    }
}

function showPage(page) {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("about").classList.add("hidden");
    document.getElementById("contact").classList.add("hidden");

    document.getElementById(page).classList.remove("hidden");
}

</script>

</body>
</html>
