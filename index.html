<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shipment Tracking</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    margin: 0;
}

.header {
    background: #1e6bd6;
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 20px;
}

.container {
    width: 90%;
    max-width: 500px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #1e6bd6;
    color: white;
    border: none;
    cursor: pointer;
}

.status {
    margin-top: 15px;
    padding: 10px;
    background: #d4edda;
    text-align: center;
    font-weight: bold;
    display: none;
}

.error {
    margin-top: 15px;
    padding: 10px;
    background: #f8d7da;
    text-align: center;
    color: red;
    display: none;
}

.result {
    margin-top: 15px;
    display: none;
}

.loading {
    text-align: center;
    display: none;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="header">Shipment Tracking</div>

<div class="container">

    <label>Enter Tracking Number</label>
    <input id="trackInput" placeholder="Example: HC1001">

    <button onclick="track()">Track Shipment</button>

    <div class="loading" id="loading">Checking shipment...</div>

    <div class="error" id="error">Tracking number not found</div>

    <div class="status" id="status"></div>

    <div class="result" id="result"></div>

</div>

<script>

const shipments = {
    "HC1001": {
        status: "IN TRANSIT",
        shipper: "Shenzhen Global Trade",
        consignee: "Mustafa",
        origin: "China",
        destination: "Iraq",
        vessel: "EVERGREEN",
        container: "MSKU1234567",
        weight: "18,250 KG",
        departure: "13 Mar 2026",
        arrival: "07 May 2026"
    },

    "HC2002": {
        status: "DELIVERED",
        shipper: "Dubai Export Co.",
        consignee: "Ahmed",
        origin: "UAE",
        destination: "Egypt",
        vessel: "MAERSK",
        container: "MSKU999888",
        weight: "9,000 KG",
        departure: "01 Feb 2026",
        arrival: "20 Feb 2026"
    }
};

function track() {

    let code = document.getElementById("trackInput").value.trim();

    document.getElementById("error").style.display = "none";
    document.getElementById("result").style.display = "none";
    document.getElementById("status").style.display = "none";

    document.getElementById("loading").style.display = "block";

    setTimeout(() => {

        document.getElementById("loading").style.display = "none";

        if (shipments[code]) {

            let s = shipments[code];

            document.getElementById("status").innerText = s.status;
            document.getElementById("status").style.display = "block";

            document.getElementById("result").innerHTML = `
                <p><b>Tracking:</b> ${code}</p>
                <p><b>Shipper:</b> ${s.shipper}</p>
                <p><b>Consignee:</b> ${s.consignee}</p>
                <p><b>Origin:</b> ${s.origin}</p>
                <p><b>Destination:</b> ${s.destination}</p>
                <p><b>Vessel:</b> ${s.vessel}</p>
                <p><b>Container:</b> ${s.container}</p>
                <p><b>Weight:</b> ${s.weight}</p>
                <p><b>Departure:</b> ${s.departure}</p>
                <p><b>Arrival:</b> ${s.arrival}</p>
                <br>
                <img src="Bill.png" width="100%">
            `;

            document.getElementById("result").style.display = "block";

        } else {
            document.getElementById("error").style.display = "block";
        }

    }, 1500);
}

</script>

</body>
</html>
