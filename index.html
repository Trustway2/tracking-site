<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trustway Logistics - Tracking</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eef2f7;
}

/* HEADER */
.header {
    background: #0d6efd;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* BOX */
.container {
    max-width: 700px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    margin-top: 10px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #084298;
}

/* RESULT */
.result {
    display: none;
    margin-top: 25px;
}

/* CARD */
.card {
    background: #f9fbfd;
    padding: 20px;
    border-radius: 10px;
}

/* STATUS */
.status {
    padding: 10px;
    border-radius: 6px;
    background: #d1e7dd;
    color: #0f5132;
    text-align: center;
    font-weight: bold;
    margin-bottom: 15px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.label {
    font-weight: bold;
    color: #555;
}

.value {
    color: #000;
}

/* IMAGE */
img {
    width: 100%;
    margin-top: 15px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="header">
    TRUSTWAY LOGISTICS - TRACKING
</div>

<div class="container">

    <h3>Track Your Shipment</h3>

    <input type="text" id="trackingInput" placeholder="Enter tracking number">

    <button onclick="trackShipment()">Track Shipment</button>

    <div id="result" class="result">

        <div class="card">

            <div class="status">IN TRANSIT</div>

            <div class="grid">
                <div class="label">Tracking Number:</div>
                <div class="value">HC1001</div>

                <div class="label">Shipper:</div>
                <div class="value">Shenzhen Global Trade</div>

                <div class="label">Consignee:</div>
                <div class="value">Mustafa</div>

                <div class="label">Origin:</div>
                <div class="value">Shenzhen, China</div>

                <div class="label">Destination:</div>
                <div class="value">Umm Qasr, Iraq</div>

                <div class="label">Vessel:</div>
                <div class="value">EVERGREEN</div>

                <div class="label">Container:</div>
                <div class="value">MSKU1234567</div>

                <div class="label">Weight:</div>
                <div class="value">18,250 KG</div>

                <div class="label">Departure:</div>
                <div class="value">13 Mar 2026</div>

                <div class="label">Arrival:</div>
                <div class="value">07 May 2026</div>
            </div>

            <img id="shipmentImage" src="Bill.png" style="display:none;">

        </div>

    </div>

</div>

<script>
function trackShipment() {
    var code = document.getElementById("trackingInput").value;

    if(code === "HC1001") {
        document.getElementById("result").style.display = "block";
        document.getElementById("shipmentImage").style.display = "block";
    } else {
        alert("Tracking number not found");
    }
}
</script>

</body>
</html>
