<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trustway Logistics</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eef2f7;
}

header {
    background: #1f3c88;
    color: white;
    padding: 20px;
    text-align: center;
}

nav {
    background: #162d63;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

.container {
    max-width: 800px;
    margin: 20px auto;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
}

button {
    background: #1f3c88;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.9;
}

.status {
    padding: 12px;
    text-align: center;
    font-weight: bold;
    border-radius: 8px;
    margin-top: 15px;
}

.intransit { background: #d4edda; color: #155724; }

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
}

.box {
    background: #f8f9fa;
    padding: 10px;
    border-radius: 8px;
}

.timeline {
    margin-top: 20px;
    border-left: 3px solid #1f3c88;
    padding-left: 15px;
}

.timeline div {
    margin-bottom: 10px;
    position: relative;
}

.timeline div::before {
    content: '';
    width: 10px;
    height: 10px;
    background: #1f3c88;
    border-radius: 50%;
    position: absolute;
    left: -19px;
    top: 5px;
}

img {
    width: 100%;
    margin-top: 15px;
    border-radius: 10px;
}

.footer {
    text-align:center;
    padding:15px;
    font-size:12px;
    color:#777;
}
</style>
</head>

<body>

<header>
<h2>Global Shipment Tracking</h2>
<p>Trustway Logistics</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<div class="container">
<div class="card">

<h3>Track Your Shipment</h3>

<input id="trackingInput" placeholder="Enter Tracking Number">
<button onclick="track()">Track Shipment</button>

<p style="font-size:12px; color:#777; text-align:center;">
This tracking page displays shipment information provided by the sender.
</p>

<div id="result"></div>

</div>
</div>

<div class="footer">
© 2026 Trustway Logistics. All rights reserved.
</div>

<script>

const shipments = {
    "HC1001": {
        status: "IN TRANSIT",
        customer: "Mustafa fathelrhman",
        shipment: "Solar powered ev charging devices",
        from: "Shenzhen Port, China",
        to: "Umm Qasr Port, Iraq",
        price: "$2900",
        arrival: "7 May 2026",
        image: "https://raw.githubusercontent.com/Trustway2/tracking-site/main/bill.png"
    }
};

function track() {
    let code = document.getElementById("trackingInput").value.trim();
    let result = document.getElementById("result");

    result.innerHTML = "<p>Loading...</p>";

    setTimeout(() => {

        if (shipments[code]) {
            let d = shipments[code];

            result.innerHTML = `
                <div class="status intransit">${d.status}</div>

                <div class="grid">
                    <div class="box"><b>Tracking:</b> ${code}</div>
                    <div class="box"><b>Customer:</b> ${d.customer}</div>
                    <div class="box"><b>Shipment:</b> ${d.shipment}</div>
                    <div class="box"><b>From:</b> ${d.from}</div>
                    <div class="box"><b>To:</b> ${d.to}</div>
                    <div class="box"><b>Price:</b> ${d.price}</div>
                    <div class="box"><b>Arrival:</b> ${d.arrival}</div>
                </div>

                <div class="timeline">
                    <div>Shipment Created</div>
                    <div>In Transit</div>
                    <div>Arriving Soon</div>
                </div>

                <img src="${d.image}">
            `;
        } else {
            result.innerHTML = "<p style='color:red;'>Tracking number not found</p>";
        }

    }, 800);
}

</script>

</body>
</html>
