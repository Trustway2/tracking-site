<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustWay Shipping</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #1f3b63;
  color: white;
  text-align: center;
  padding: 15px;
}

nav {
  background: #ddd;
  text-align: center;
  padding: 10px;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: black;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 8px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #1f3b63;
  color: white;
  border: none;
  cursor: pointer;
}

.status {
  background: #b7d7b7;
  padding: 10px;
  text-align: center;
  margin-top: 10px;
  display: none;
}

img {
  width: 100%;
  margin-top: 15px;
}

footer {
  text-align: center;
  background: #1f3b63;
  color: white;
  padding: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  <h2>TrustWay Shipping</h2>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<div class="container">
  <div class="card">

    <h3>Track Your Shipment</h3>

    <input id="trackingInput" placeholder="Enter tracking number">
    <button onclick="track()">Track Shipment</button>

    <div id="status" class="status">In Transit</div>

    <p><b>Tracking:</b> <span id="tracking"></span></p>
    <p><b>Customer:</b> <span id="customer"></span></p>
    <p><b>Shipment:</b> <span id="shipment"></span></p>
    <p><b>From:</b> <span id="from"></span></p>
    <p><b>To:</b> <span id="to"></span></p>
    <p><b>Price:</b> <span id="price"></span></p>
    <p><b>Arrival:</b> <span id="arrival"></span></p>

    <img id="bill" src="" style="display:none">

  </div>
</div>

<footer>
  © 2026 TrustWay Logistics
</footer>

<script>

function track() {

  const code = document.getElementById("trackingInput").value;

  if (code === "HC1001") {

    document.getElementById("status").style.display = "block";

    document.getElementById("tracking").innerText = "HC1001";
    document.getElementById("customer").innerText = "Mustafa fathelrhman";
    document.getElementById("shipment").innerText = "Solar powered ev charging devices";
    document.getElementById("from").innerText = "Shenzhen Port, China";
    document.getElementById("to").innerText = "Umm Qasr Port, Iraq";
    document.getElementById("price").innerText = "$2900";
    document.getElementById("arrival").innerText = "7 May 2026";

    document.getElementById("bill").src = "https://i.imgur.com/your-image.jpg"; // حط رابط الصورة هنا
    document.getElementById("bill").style.display = "block";

  } else {
    alert("Tracking number not found");
  }

}

</script>

</body>
</html>
