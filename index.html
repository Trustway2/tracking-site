<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrustWay Shipping</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #2c4a73;
    color: white;
    text-align: center;
    padding: 15px;
}

nav {
    background: #ddd;
    text-align: center;
    padding: 10px;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: black;
}

.container {
    width: 90%;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 10px;
    background: #2c4a73;
    color: white;
    border: none;
}

.result {
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <h2>TrustWay Shipping</h2>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h3>Track Your Shipment</h3>

    <input type="text" id="trackInput" placeholder="Enter tracking number">
    <button onclick="track()">Track Shipment</button>

    <div class="result" id="result"></div>
</div>

<footer style="text-align:center;padding:10px;background:#2c4a73;color:white;">
© 2026 TrustWay Logistics
</footer>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDplDmQn7oBNQouovvO4z9WpoDRmR72GLo",
  authDomain: "shipping-system-10d98.firebaseapp.com",
  projectId: "shipping-system-10d98",
  storageBucket: "shipping-system-10d98.firebasestorage.app",
  messagingSenderId: "498079715287",
  appId: "1:498079715287:web:4ea3734979ca7c06d40592"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.track = async function () {
    const input = document.getElementById("trackInput").value.trim();
    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "Searching...";

    const querySnapshot = await getDocs(collection(db, "shipments"));

    let found = false;

    querySnapshot.forEach((doc) => {
        const data = doc.data();

        if (data.trackingNumber === input) {
            found = true;

            // تحويل التاريخ
            let arrival = "";
            if (data.estimatedArrival?.seconds) {
                const d = new Date(data.estimatedArrival.seconds * 1000);
                arrival = d.toLocaleDateString("en-GB", {
                    day: "numeric",
                    month: "long",
                    year: "numeric"
                });
            }

            resultDiv.innerHTML = `
                <p><b>Tracking:</b> ${data.trackingNumber}</p>
                <p><b>Customer:</b> ${data.customerName}</p>
                <p><b>Shipment:</b> ${data.shipmentName}</p>
                <p><b>From:</b> ${data.originport}</p>
                <p><b>To:</b> ${data.destinationPort}</p>
                <p><b>Price:</b> $${data.price}</p>
                <p><b>Arrival:</b> ${arrival}</p>
            `;
        }
    });

    if (!found) {
        resultDiv.innerHTML = "Tracking number not found";
    }
};
</script>

</body>
</html>
