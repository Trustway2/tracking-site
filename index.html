<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Shipment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: #1f3b63;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #eee;
      padding: 10px;
      text-align: center;
    }

    nav a {
      margin: 10px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    .container {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 2px solid #333;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2d4d77;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .status {
      background: #b7d7b0;
      padding: 10px;
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    .result p {
      margin: 6px 0;
    }

    img {
      width: 100%;
      margin-top: 15px;
    }

    footer {
      background: #1f3b63;
      color: white;
      padding: 10px;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h2>TrustWay Shipping</h2>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<div class="container">

  <h2>Track Your Shipment</h2>

  <input type="text" id="trackingInput" placeholder="Enter tracking number">
  <button onclick="track()">Track Shipment</button>

  <div id="statusBox" class="status" style="display:none;"></div>

  <div class="result">
    <p><b>Tracking:</b> <span id="tracking"></span></p>
    <p><b>Customer:</b> <span id="customer"></span></p>
    <p><b>Shipment:</b> <span id="shipment"></span></p>
    <p><b>From:</b> <span id="from"></span></p>
    <p><b>To:</b> <span id="to"></span></p>
    <p><b>Price:</b> $<span id="price"></span></p>
    <p><b>Arrival:</b> <span id="arrival"></span></p>

    <img id="shipmentImage" src="bill.jpg" alt="">
  </div>

</div>

<footer>
  © 2026 TrustWay Logistics
</footer>
