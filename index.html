<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Shipment Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: #2f5fa7;
  color: white;
  text-align: center;
  padding: 20px;
}

nav {
  background: #1f4c8f;
  text-align: center;
  padding: 10px;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

.container {
  max-width: 700px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 8px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #2f5fa7;
  color: white;
  border: none;
}

.status {
  background: #cfe8d5;
  padding: 10px;
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}

img {
  width: 100%;
  margin-top: 20px;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>
  <h2>Global Shipment Tracking</h2>
  <p>Trustway Logistics</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<div class="container">
  <h3>Track Your Shipment</h3>

  <input type="text" id="trackInput" placeholder="Enter tracking code">
  <button onclick="track()">Track Shipment</button>

  <div id="result"></div>
</div>

<script>
function track() {
  var code = document.getElementById("trackInput").value;
  var result = document.getElementById("result");

  if (code === "HC1001") {
    result.innerHTML = `
      <div class="status">IN TRANSIT</div>

      <p><b>Tracking:</b> HC1001</p>
      <p><b>Customer:</b> Mustafa fathelrhman</p>
      <p><b>Shipment:</b> Solar powered ev charging devices</p>
      <p><b>From:</b> Shenzhen Port, China</p>
      <p><b>To:</b> Umm Qasr Port, Iraq</p>
      <p><b>Price:</b> $2900</p>
      <p><b>Arrival:</b> 7 May 2026</p>

      <img src="bill.png">
    `;
  } else {
    result.innerHTML = "<p style='color:red'>Tracking number not found</p>";
  }
}
</script>

</body>
</html>
