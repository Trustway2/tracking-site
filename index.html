<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustWay Shipping</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: #1e3a5f;
  color: white;
  text-align: center;
  padding: 15px;
}

nav {
  background: #ddd;
  text-align: center;
  padding: 10px;
}

nav a {
  margin: 10px;
  text-decoration: none;
  color: black;
}

.container {
  padding: 20px;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #2f4f75;
  color: white;
  border: none;
}

.status {
  background: #b7d3b7;
  padding: 10px;
  text-align: center;
  margin-top: 10px;
}

#result {
  display: none;
  margin-top: 15px;
}

img {
  width: 100%;
  margin-top: 10px;
}

footer {
  background: #1e3a5f;
  color: white;
  text-align: center;
  padding: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
<h2>TrustWay Shipping</h2>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<div class="container">
<div class="box">

<h3>Track Your Shipment</h3>

<input type="text" id="trackingInput" placeholder="Enter tracking number">
<button onclick="track()">Track Shipment</button>

<div id="result"></div>

</div>
</div>

<footer>
© 2026 TrustWay Logistics
</footer>

<script>
function track() {
  let code = document.getElementById("trackingInput").value.trim();
  let result = document.getElementById("result");

  // امسح القديم
  result.innerHTML = "";
  result.style.display = "none";

  if(code === "HC1001") {

    result.style.display = "block";

    result.innerHTML = `
      <div class="status">In Transit</div>

      <p><b>Tracking:</b> HC1001</p>
      <p><b>Customer:</b> Mustafa fathelrhman</p>
      <p><b>Shipment:</b> Solar powered ev charging devices</p>
      <p><b>From:</b> Shenzhen port China</p>
      <p><b>To:</b> Umm Qasr Port, Iraq</p>
      <p><b>Price:</b> $2900</p>
      <p><b>Arrival:</b> 7 May 2026</p>

      <img src="https://i.imgur.com/8Km9tLL.png">
    `;

  } else {
    alert("❌ Tracking number not found");
  }
}
</script>

</body>
</html>
