<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipment Tracking</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
}

.header {
    background: #2d6cdf;
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 20px;
}

.container {
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #1f4fa8;
}

.status {
    background: #d4edda;
    padding: 10px;
    text-align: center;
    margin-top: 15px;
    border-radius: 5px;
    font-weight: bold;
}

.details {
    margin-top: 15px;
    line-height: 1.8;
}

img {
    width: 100%;
    margin-top: 20px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="header">Shipment Tracking</div>

<div class="container">

    <h3>Track Your Shipment</h3>

    <!-- INPUT بدون أي placeholder -->
    <input id="trackInput" type="text" required>

    <button onclick="trackShipment()">Track Shipment</button>

    <div id="result"></div>

</div>

<script>
function trackShipment() {
    var code = document.getElementById("trackInput").value;
    var result = document.getElementById("result");

    if(code === "HC1001") {
        result.innerHTML = `
        <div class="status">IN TRANSIT</div>

        <div class="details">
        <b>Tracking:</b> HC1001<br>
        <b>Shipper:</b> Shenzhen Global Trade<br>
        <b>Consignee:</b> Mustafa<br>
        <b>Origin:</b> China<br>
        <b>Destination:</b> Iraq<br>
        <b>Vessel:</b> EVERGREEN<br>
        <b>Container:</b> MSKU1234567<br>
        <b>Weight:</b> 18,250 KG<br>
        <b>Departure:</b> 13 Mar 2026<br>
        <b>Arrival:</b> 07 May 2026
        </div>

        <img src="Bill.png">
        `;
    } else {
        result.innerHTML = `
        <div style="color:red; text-align:center; margin-top:15px;">
        Invalid Tracking Number
        </div>
        `;
    }
}
</script>

</body>
</html>
