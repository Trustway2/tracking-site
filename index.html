<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trustway Logistics</title>

<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- BARCODE (المهم 👇) -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.card {
  background: white;
  padding: 20px;
  margin: auto;
  max-width: 420px;
  border-radius: 10px;
}

.doc {
  border: 2px solid black;
  padding: 15px;
  margin-top: 15px;
}

h2 {
  color: green;
}

.field {
  border: 1px solid #ddd;
  padding: 6px;
  margin: 4px 0;
  text-align: left;
}

.stamp {
  border: 3px solid green;
  display: inline-block;
  padding: 10px 20px;
  color: green;
  font-weight: bold;
  transform: rotate(-10deg);
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>🚚 TRUSTWAY LOGISTICS</h2>

<div class="card">
  <input id="trackInput" placeholder="Enter tracking number">
  <br><br>
  <button onclick="track()">Track</button>

  <div id="result"></div>
</div>

<script>

var shipments = {
  "HC1001": {
    name: "Mustafa",
    status: "In Transit",
    from: "China",
    to: "Iraq",
    container: "MSKU1234567",
    vessel: "Evergreen",
    line: "Maersk",
    price: "$2900",
    date: "11 Mar 2026",
    arrival: "7 May 2026"
  }
};

function track() {

  var input = document.getElementById("trackInput").value.trim().toUpperCase();
  var result = document.getElementById("result");

  if (shipments[input]) {

    var d = shipments[input];

    result.innerHTML = `
    <div class="doc" id="invoice">

      <h3>TRUSTWAY LOGISTICS</h3>
      <p>Official Shipping Document</p>
      <hr>

      <!-- باركود حقيقي -->
      <svg id="barcode"></svg>

      <div id="qrcode"></div>

      <div class="field"><b>Tracking:</b> ${input}</div>
      <div class="field"><b>Customer:</b> ${d.name}</div>
      <div class="field"><b>Status:</b> ${d.status}</div>
      <div class="field"><b>From:</b> ${d.from}</div>
      <div class="field"><b>To:</b> ${d.to}</div>
      <div class="field"><b>Container:</b> ${d.container}</div>
      <div class="field"><b>Vessel:</b> ${d.vessel}</div>
      <div class="field"><b>Shipping Line:</b> ${d.line}</div>
      <div class="field"><b>Price:</b> ${d.price}</div>
      <div class="field"><b>Shipment Date:</b> ${d.date}</div>
      <div class="field"><b>Arrival:</b> ${d.arrival}</div>

      <div class="stamp">✔ APPROVED</div>

      <br><br>
      <button onclick="downloadPDF()">Download PDF</button>

    </div>
    `;

    // ✅ توليد باركود حقيقي (مهم جداً)
    JsBarcode("#barcode", input, {
      format: "CODE128",
      width: 2,
      height: 70,
      displayValue: true
    });

    // QR
    document.getElementById("qrcode").innerHTML = "";
    new QRCode(document.getElementById("qrcode"), {
      text: window.location.href + "?code=" + input,
      width: 120,
      height: 120
    });

  } else {
    result.innerHTML = "Not found";
  }
}

// PDF
function downloadPDF() {
  var element = document.getElementById("invoice");
  html2pdf().from(element).save("shipment.pdf");
}

// auto load
window.onload = function () {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  if (code) {
    document.getElementById("trackInput").value = code;
    track();
  }
};

</script>

</body>
</html>
