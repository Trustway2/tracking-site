<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trustway Logistics</title>

<!-- QR + Barcode -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f7fb;
    text-align: center;
    margin: 0;
}

.header {
    background: #0a7d32;
    color: white;
    padding: 15px;
    font-size: 22px;
}

.container {
    max-width: 600px;
    margin: auto;
    margin-top: 30px;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input {
    padding: 10px;
    width: 70%;
}

button {
    padding: 10px 20px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

.card {
    margin-top: 20px;
    text-align: left;
    border: 1px solid #ddd;
    padding: 15px;
}

.box {
    background: #f5f5f5;
    padding: 8px;
    margin: 5px 0;
}

.stamp {
    border: 2px solid green;
    display: inline-block;
    padding: 8px;
    color: green;
    transform: rotate(-10deg);
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">🚚 TRUSTWAY LOGISTICS</div>

<div class="container">
<h3>Track your shipment</h3>

<input id="code" placeholder="Enter tracking number">
<br><br>

<button onclick="track()">Track</button>

<div id="result"></div>
</div>

<script>

function track(){

let code = document.getElementById("code").value.trim();

if(code === ""){
  document.getElementById("result").innerHTML = "";
  return;
}

let site = "https://trustway2.github.io/tracking-site/?code=" + code;

document.getElementById("result").innerHTML = `
<div class="card">

<h3>Shipping Document</h3>

<svg id="barcode"></svg>
<div id="qrcode"></div>

<div class="box"><b>Tracking:</b> ${code}</div>
<div class="box"><b>Status:</b> In Transit</div>
<div class="box"><b>From:</b> Shenzhen, China</div>
<div class="box"><b>To:</b> Umm Qasr, Iraq</div>
<div class="box"><b>Shipping Line:</b> Evergreen Line</div>

<div class="stamp">✔ APPROVED</div>

</div>
`;

// barcode
JsBarcode("#barcode", code, {
  format: "CODE128",
  width: 2,
  height: 60
});

// QR
document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"), {
  text: site,
  width: 120,
  height: 120
});

}

// 🔥 فتح تلقائي فقط لو فيه code
let params = new URLSearchParams(window.location.search);
let auto = params.get("code");

if(auto && auto !== ""){
  document.getElementById("code").value = auto;
  track();
}

</script>

</body>
</html>
