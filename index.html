<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trustway Logistics</title>

<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- BARCODE (المهم 👇) -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input{
padding:10px;
width:80%;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

.doc{
margin-top:20px;
border:2px solid #000;
padding:15px;
text-align:left;
}

h2{
color:green;
text-align:center;
}

.stamp{
margin-top:20px;
border:3px solid green;
display:inline-block;
padding:10px;
color:green;
transform:rotate(-10deg);
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<h2>🚚 TRUSTWAY LOGISTICS</h2>

<input id="trackInput" placeholder="Enter tracking">
<br>
<button onclick="track()">Track</button>

<div id="result"></div>

<button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

var shipments = {
"HC1001":{
name:"Mustafa",
status:"In Transit",
from:"China",
to:"Iraq",
price:"$2900",
date:"11 Mar 2026",
arrival:"7 May 2026",
container:"MSKU1234567",
vessel:"Evergreen",
line:"Maersk"
}
};

function track(){

var input = document.getElementById("trackInput").value.trim().toUpperCase();
var result = document.getElementById("result");

if(shipments[input]){

var d = shipments[input];

result.innerHTML = `
<div class="doc" id="pdfContent">

<h2>TRUSTWAY LOGISTICS</h2>
<p>Official Shipping Document</p>
<hr>

<svg id="barcode"></svg>

<p style="text-align:center">${input}</p>

<div id="qrcode"></div>

<p><b>Tracking:</b> ${input}</p>
<p><b>Customer:</b> ${d.name}</p>
<p><b>Status:</b> ${d.status}</p>
<p><b>From:</b> ${d.from}</p>
<p><b>To:</b> ${d.to}</p>
<p><b>Container:</b> ${d.container}</p>
<p><b>Vessel:</b> ${d.vessel}</p>
<p><b>Shipping Line:</b> ${d.line}</p>
<p><b>Price:</b> ${d.price}</p>
<p><b>Shipment Date:</b> ${d.date}</p>
<p><b>Arrival:</b> ${d.arrival}</p>

<div class="stamp">✔ APPROVED</div>

</div>
`;

/* BARCODE */
JsBarcode("#barcode", input, {
format:"CODE128",
displayValue:false,
width:2,
height:80
});

/* QR */
document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"),{
text: window.location.href + "?code=" + input,
width:120,
height:120
});

}else{
result.innerHTML = "<p style='color:red'>Not found</p>";
}

}

/* PDF */
function downloadPDF(){
var element = document.getElementById("pdfContent");
html2pdf().from(element).save("shipping.pdf");
}

/* قراءة QR */
window.onload = function(){
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if(code){
document.getElementById("trackInput").value = code;
track();
}
}
</script>

</body>
</html>
