<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipment Tracking</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

header {
  background: #1e3a5f;
  color: white;
  text-align: center;
  padding: 15px;
}

.container {
  padding: 20px;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  background: #1e3a5f;
  color: white;
  border: none;
}

.status {
  background: #c8e6c9;
  padding: 10px;
  text-align: center;
  margin-top: 10px;
}

img {
  width: 100%;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
<h2>Shipment Tracking</h2>
</header>

<div class="container">
<div class="box">

<h3>Track Your Shipment</h3>

<input id="trackInput" placeholder="Enter tracking number">
<button onclick="track()">Track Shipment</button>

<div id="result"></div>

<img src="bill.png">

</div>
</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDplDmQn7oBNQouovvO4z9WpoDRmR72GLo",
  authDomain: "shipping-system-10d98.firebaseapp.com",
  projectId: "shipping-system-10d98",
  storageBucket: "shipping-system-10d98.firebasestorage.app",
  messagingSenderId: "498079715287",
  appId: "1:498079715287:web:4ea3734979ca7c06d40592"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.track = async function () {

  let id = document.getElementById("trackInput").value;

  const docRef = doc(db, "shipments", id);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {

    let data = docSnap.data();

    document.getElementById("result").innerHTML = `
      <div class="status">${data.Status}</div>

      <p><b>Tracking:</b> ${id}</p>
      <p><b>Customer:</b> ${data["Customer name"]}</p>
      <p><b>Shipment:</b> ${data["Shipment name"]}</p>
      <p><b>From:</b> ${data.originport}</p>
      <p><b>To:</b> ${data.destinationPort}</p>
      <p><b>Price:</b> $${data.price}</p>
      <p><b>Arrival:</b> ${data.estimatedArrival}</p>
    `;

  } else {
    alert("Invalid Tracking Number");
  }
}

</script>

</body>
</html>
