<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trustway Logistics Tracking</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f4f7;
}

header {
    background: #0d6efd;
    color: white;
    padding: 15px;
    text-align: center;
}

.logo {
    width: 60px;
    vertical-align: middle;
}

.container {
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #084298;
}

.result {
    display: none;
    margin-top: 20px;
}

.card {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
}

.row {
    margin: 8px 0;
}

.label {
    font-weight: bold;
}

img.bill {
    width: 100%;
    margin-top: 20px;
    border-radius: 10px;
    border: 1px solid #ddd;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <h2>TRUSTWAY LOGISTICS</h2>
</header>

<div class="container">

    <h3>Track your shipment</h3>

    <input type="text" id="trackingInput" placeholder="Enter Tracking Number">
    <button onclick="track()">Track Shipment</button>

    <div class="result" id="result">

        <div class="card">
            <div class="row"><span class="label">Tracking:</span> HC1001</div>
            <div class="row"><span class="label">Customer:</span> Mustafa</div>
            <div class="row"><span class="label">Status:</span> In Transit</div>
            <div class="row"><span class="label">From:</span> Shenzhen Port, China</div>
            <div class="row"><span class="label">To:</span> Umm Qasr Port, Iraq</div>
            <div class="row"><span class="label">Shipping Line:</span> Evergreen Line</div>
            <div class="row"><span class="label">Vessel:</span> EVERGREEN</div>
            <div class="row"><span class="label">Container:</span> MSKU1234567</div>
            <div class="row"><span class="label">Shipment Date:</span> 11 Mar 2026</div>
            <div class="row"><span class="label">Estimated Arrival:</span> 07 May 2026</div>
            <div class="row"><span class="label">Price:</span> $2900</div>
        </div>

        <!-- صورة البوليصة -->
        <img src="bill.jpg" class="bill">

    </div>

</div>

<script>
function track() {
    var code = document.getElementById("trackingInput").value;

    if(code === "HC1001"){
        document.getElementById("result").style.display = "block";
    } else {
        alert("Tracking number not found");
    }
}
</script>

</body>
</html>
