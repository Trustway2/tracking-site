<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shipment Tracking</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
    }
    .header {
      background: #2d4f7c;
      padding: 15px;
      color: white;
      text-align: center;
    }
    .nav {
      background: #2d4f7c;
      padding: 10px;
      text-align: center;
    }
    .nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }
    .container {
      width: 90%;
      max-width: 500px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #2d4f7c;
      color: white;
      border: none;
    }
    .status {
      background: #c8e6c9;
      padding: 10px;
      text-align: center;
      margin-top: 10px;
    }
    .result {
      margin-top: 15px;
    }
    img {
      width: 100%;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="header">Shipment Tracking</div>

<div class="nav">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</div>

<div class="container">
  <h2>Track Your Shipment</h2>

  <input type="text" id="trackInput" placeholder="Enter tracking number">
  <button onclick="track()">Track Shipment</button>

  <div id="status" class="status" style="display:none;"></div>

  <div id="result" class="result" style="display:none;">
    <p><b>Tracking:</b> HC1001</p>
    <p><b>Customer:</b> Mustafa fathelrhman</p>
    <p><b>Shipment:</b> Solar powered ev charging devices</p>
    <p><b>From:</b> Shenzhen port China</p>
    <p><b>To:</b> Umm Qasr Port, Iraq</p>
    <p><b>Price:</b> $2900</p>
    <p><b>Arrival:</b> 7 May 2026</p>

    <img src="YOUR_IMAGE_URL_HERE">
  </div>
</div>

<script>
function track() {
  var input = document.getElementById("trackInput").value;

  if (input === "HC1001") {
    document.getElementById("status").style.display = "block";
    document.getElementById("status").innerText = "In Transit";
    document.getElementById("result").style.display = "block";
  } else {
    alert("Tracking number not found");
  }
}
</script>

</body>
</html>
