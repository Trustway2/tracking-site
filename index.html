<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Shipment Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

header {
  background: #2f5fa7;
  color: white;
  text-align: center;
  padding: 20px;
}

nav {
  background: #1f4c8f;
  text-align: center;
  padding: 10px;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

.container {
  max-width: 700px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 8px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #2f5fa7;
  color: white;
  border: none;
  cursor: pointer;
}

.status {
  background: #cfe8d5;
  padding: 10px;
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}

img {
  width: 100%;
  margin-top: 20px;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>
  <h2>Global Shipment Tracking</h2>
  <p>Trustway Logistics</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<div class="container">
  <h3>Track Your Shipment</h3>

  <input type="text" id="trackingInput" placeholder="Enter tracking code">
  <button onclick="track()">Track Shipment</button>

  <div id="result"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PUT YOUR API KEY",
  authDomain: "PUT YOUR DOMAIN",
  projectId: "PUT YOUR PROJECT ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.track = async function () {
  const code = document.getElementById("trackingInput").value.trim();
  const result = document.getElementById("result");

  if (!code) {
    result.innerHTML = "Please enter tracking code";
    return;
  }

  const docRef = doc(db, "shipments", code);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();

    result.innerHTML = `
      <div class="status">${data.Status}</div>

      <p><b>Tracking:</b> ${data.trackingNumber}</p>
      <p><b>Customer:</b> ${data["Customer name"]}</p>
      <p><b>Shipment:</b> ${data["Shipment name"]}</p>

      <p><b>From:</b> ${data.originport || data.originPort}</p>
      <p><b>To:</b> ${data.destinationPort}</p>

      <p><b>Price:</b> $${data.price}</p>
      <p><b>Arrival:</b> ${data.estimatedArrival}</p>

      <img src="bill.png">
    `;
  } else {
    result.innerHTML = "Tracking not found";
  }
};
</script>

</body>
</html>
