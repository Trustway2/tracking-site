<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrustWay Logistics</title>

<style>
body {
  font-family: Arial;
  background: #f4f8ff;
  text-align: center;
}

.container {
  margin-top: 50px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  margin: auto;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
  color: #2b7cff;
}

.barcode {
  margin-top: 20px;
}

.stamp {
  margin-top: 20px;
  color: green;
  font-weight: bold;
}
</style>

</head>

<body>

<h1>TrustWay Logistics</h1>

<div class="container">
  <div class="card">

    <h2>Shipment Details</h2>

    <p><b>Customer:</b> Mustafa</p>
    <p><b>Shipment:</b> Solar powered ev charging devices</p>
    <p><b>Status:</b> In Transit</p>
    <p><b>From:</b> Shenzhen port China</p>
    <p><b>To:</b> Umm Qasr Port, Iraq</p>
    <p><b>Price:</b> $2900</p>
    <p><b>Shipment Date:</b> 11 Mar 2026</p>
    <p><b>Arrival:</b> 7 May 2026</p>

    <div class="barcode">
      <img src="https://barcode.tec-it.com/barcode.ashx?data=HC1001&code=Code128">
    </div>

    <div class="stamp">
      TRUSTWAY APPROVED
    </div>

  </div>
</div>

</body>
</html>
