<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trustway Logistics</title>

<style>
body {font-family: Arial; background:#f2f4f8; margin:0;}
header {background:#1e3a8a; color:white; padding:15px; text-align:center;}
nav {background:#111827; padding:10px; text-align:center;}
nav a {color:white; margin:10px; text-decoration:none;}
.container {max-width:600px; margin:30px auto; background:white; padding:20px; border-radius:10px;}
input {width:100%; padding:10px;}
button {width:100%; padding:10px; margin-top:10px; background:#2563eb; color:white; border:none;}
.result {margin-top:20px; padding:15px; background:#f9fafb;}
</style>
</head>

<body>

<header>
<h2>Shipment Tracking</h2>
</header>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">
<h3>Track Your Shipment</h3>

<input id="trackInput" placeholder="Enter Tracking Number">
<button onclick="track()">Track</button>

<div id="result"></div>
</div>

<script>
const data = {
"HC1001": {
status:"IN TRANSIT",
shipper:"Shenzhen Global Trade",
consignee:"Mustafa",
origin:"China",
destination:"Iraq"
},
"TR2002": {
status:"DELIVERED",
shipper:"Dubai Export",
consignee:"Ahmed",
origin:"UAE",
destination:"Egypt"
}
};

function track(){
let code = document.getElementById("trackInput").value.toUpperCase();
let r = document.getElementById("result");

if(data[code]){
let d = data[code];
r.innerHTML = `
<h3>${d.status}</h3>
<p><b>Tracking:</b> ${code}</p>
<p><b>Shipper:</b> ${d.shipper}</p>
<p><b>Consignee:</b> ${d.consignee}</p>
<p><b>From:</b> ${d.origin}</p>
<p><b>To:</b> ${d.destination}</p>
`;
}else{
r.innerHTML = "<p style='color:red'>Not Found</p>";
}
}
</script>

</body>
</html>
