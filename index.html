<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tracking</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f4f7;
}

header {
    background: #0d6efd;
    color: white;
    padding: 15px;
    text-align: center;
}

.logo {
    width: 60px;
    vertical-align: middle;
}

.container {
    max-width: 600px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #084298;
}

.result {
    display: none;
    margin-top: 20px;
}

.card {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
}

img {
    width: 100%;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>
    <h2>Shipment Tracking</h2>
</header>

<div class="container">

    <h3>Enter Tracking Number</h3>

    <input type="text" id="trackingInput" placeholder="Enter tracking code">

    <button onclick="trackShipment()">Track</button>

    <div id="result" class="result">
        <div class="card">
            <img id="shipmentImage" src="Bill.png" style="display:none;">
        </div>
    </div>

</div>

<script>
function trackShipment() {
    var code = document.getElementById("trackingInput").value;

    if(code === "HC1001") {
        document.getElementById("result").style.display = "block";
        document.getElementById("shipmentImage").style.display = "block";
    } else {
        alert("Tracking number not found");
    }
}
</script>

</body>
</html>
